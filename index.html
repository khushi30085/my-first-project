<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Premium Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern CSS Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #09090b; /* Deep premium dark theme */
            --card-bg: #121214;
            --border-color: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #6366f1; /* Indigo tech accent */
            --primary-hover: #4f46e5;
            --input-bg: #18181b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient Glow Background Effect */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 20%;
            z-index: 0;
            pointer-events: none;
        }

        /* Container Card */
        .auth-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        /* Header Styles */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-icon {
            width: 12px;
            height: 24px;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            border-radius: 4px;
            transform: skewX(-15deg);
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Forms Handling (Toggle Mechanism) */
        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Helper links */
        .form-options {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--primary);
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 24px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* Footer switch text */
        .auth-footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>DevStart</span>
        </div>

        <div id="login-form" class="auth-form active">
            <div class="auth-header">
                <h1>Welcome back</h1>
                <p>Enter your details to access your account</p>
            </div>
            
            <form action="/auth" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter Email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter Password" name="password" required>
                </div>
                
                <div class="form-options">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Login In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="#" onclick="switchForm('signup')">Sign up</a>
            </div>
        </div>

        <div id="signup-form" class="auth-form">
            <div class="auth-header">
                <h1>Create an account</h1>
                <p>Get started with your free account today</p>
            </div>
            
            <form action="/auth" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter Email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter Password" name="password" required>
                </div>

                <button type="submit" class="btn-submit">Get Started</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="#" onclick="switchForm('login')">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        function switchForm(formType) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            if (formType === 'signup') {
                loginForm.classList.remove('active');
                signupForm.classList.add('active');
                document.title = "Sign Up - Premium Auth";
            } else {
                signupForm.classList.remove('active');
                loginForm.classList.add('active');
                document.title = "Welcome - Premium Auth";
            }
        }
    </script>
</body>
</html>
